name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_ext: .exe
            rg_asset: x86_64-pc-windows-msvc.zip
            rg_bin: rg.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bin_ext: .exe
            rg_asset: aarch64-pc-windows-msvc.zip
            rg_bin: rg.exe
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin_ext: ""
            rg_asset: x86_64-apple-darwin.tar.gz
            rg_bin: rg
          - os: macos-15
            target: aarch64-apple-darwin
            bin_ext: ""
            rg_asset: aarch64-apple-darwin.tar.gz
            rg_bin: rg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_ext: ""
            rg_asset: x86_64-unknown-linux-musl.tar.gz
            rg_bin: rg
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin_ext: ""
            rg_asset: aarch64-unknown-linux-gnu.tar.gz
            rg_bin: rg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-gateway-ui/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: mcp-gateway-ui

      - name: Build frontend dist
        run: npm run build
        working-directory: mcp-gateway-ui
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Install Linux system deps for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            patchelf
          if ! sudo apt-get install -y libayatana-appindicator3-dev; then
            sudo apt-get install -y libappindicator3-dev
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download ripgrep for bundled shell tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/BurntSushi/ripgrep/releases/latest" `
            -Headers @{ "User-Agent" = "mcp-gateway-release" }
          $asset = $release.assets |
            Where-Object { $_.name -like "ripgrep-*-${{ matrix.rg_asset }}" } |
            Select-Object -First 1
          if (-not $asset) {
            throw "Could not find ripgrep release asset matching ${{ matrix.rg_asset }}"
          }
          $checksumAsset = $release.assets |
            Where-Object { $_.name -eq "$($asset.name).sha256" } |
            Select-Object -First 1
          if (-not $checksumAsset) {
            throw "Could not find checksum for $($asset.name)"
          }

          $archive = Join-Path $env:RUNNER_TEMP $asset.name
          $checksumFile = "$archive.sha256"
          $extractDir = Join-Path $env:RUNNER_TEMP "ripgrep-extract"
          $destDir = "mcp-gateway/.bundle-tools/ripgrep/${{ matrix.target }}"
          $dest = Join-Path $destDir "${{ matrix.rg_bin }}"

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive
          Invoke-WebRequest -Uri $checksumAsset.browser_download_url -OutFile $checksumFile
          $expectedHash = [regex]::Match((Get-Content -Raw $checksumFile), "[a-fA-F0-9]{64}").Value.ToLowerInvariant()
          if (-not $expectedHash) {
            throw "Could not parse checksum for $($asset.name)"
          }
          $actualHash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Checksum mismatch for $($asset.name)"
          }

          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extractDir, $destDir | Out-Null

          if ($archive.EndsWith(".zip")) {
            Expand-Archive -Path $archive -DestinationPath $extractDir -Force
          } else {
            tar -xzf $archive -C $extractDir
          }

          $rg = Get-ChildItem -Path $extractDir -Recurse -File -Filter "${{ matrix.rg_bin }}" |
            Select-Object -First 1
          if (-not $rg) {
            throw "Downloaded ripgrep archive did not contain ${{ matrix.rg_bin }}"
          }

          Copy-Item -Path $rg.FullName -Destination $dest -Force
          if ("${{ runner.os }}" -ne "Windows") {
            chmod +x $dest
          }
          & $dest --version

      - name: Build Tauri desktop binary
        run: npx tauri build --ci --no-bundle --target ${{ matrix.target }}
        working-directory: mcp-gateway-ui
        env:
          MCP_GATEWAY_BUNDLED_RG_PATH: ${{ github.workspace }}/mcp-gateway/.bundle-tools/ripgrep/${{ matrix.target }}/${{ matrix.rg_bin }}

      - name: Prepare release binary
        shell: pwsh
        run: |
          $source = "mcp-gateway-ui/src-tauri/target/${{ matrix.target }}/release/mcp-gateway-ui${{ matrix.bin_ext }}"
          $destDir = "release"
          $dest = Join-Path $destDir "mcp-gateway-ui-${{ matrix.target }}${{ matrix.bin_ext }}"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item -Path $source -Destination $dest -Force
          Get-Item $dest | Format-List FullName,Length

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: mcp-gateway-ui-${{ matrix.target }}
          path: release/mcp-gateway-ui-${{ matrix.target }}${{ matrix.bin_ext }}

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download desktop binary artifact
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release notes from commits
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          current_sha="$(git rev-list -n 1 "$current_tag")"

          if previous_tag="$(git describe --tags --abbrev=0 "${current_sha}^" 2>/dev/null)"; then
            range="${previous_tag}..${current_tag}"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            heading="Commits since ${previous_tag}"
          else
            range="${current_tag}"
            compare_url=""
            heading="Commits"
          fi

          {
            echo "## ${heading}"
            echo
            if git log "${range}" --pretty=format:'- %s ([`%h`](https://github.com/${{ github.repository }}/commit/%H))' --no-decorate | grep .; then
              true
            else
              echo "- No commits found."
            fi
            echo
            if [ -n "${compare_url}" ]; then
              echo "**Full Changelog:** ${compare_url}"
            fi
          } > release-notes.md

      - name: Attach binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release-artifacts/**/mcp-gateway-ui-*
